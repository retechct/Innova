<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablet Producción - Innova Mobili</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        .contenedor { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #f1c40f; text-transform: uppercase; letter-spacing: 2px; }
        
        .lista-tareas { display: grid; gap: 20px; }
        
        .tarjeta-tarea { 
            background: #2d2d2d; 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 8px solid #e74c3c;
        }

        .foto-mueble {
            width: 180px;
            height: 180px;
            object-fit: cover;
            background-color: #3d3d3d;
        }

        .info-tarea { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        
        .info-tarea h2 { margin: 0; color: #fff; font-size: 24px; }
        
        .fecha-entrega { 
            background: #e74c3c; 
            color: white; 
            padding: 5px 12px; 
            border-radius: 20px; 
            font-weight: bold; 
            display: inline-block;
            margin: 10px 0;
        }

        .detalle { color: #aaa; font-size: 16px; margin-bottom: 10px; }
        .detalle strong { color: #f1c40f; }

        .btn-terminar { 
            background: #2ecc71; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 16px;
            transition: 0.3s;
        }
        .btn-terminar:hover { background: #27ae60; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Área: ESTRUCTURAS 🪚</h1>
        <div id="lista-tareas" class="lista-tareas">
            <p style="text-align: center;">Buscando tareas pendientes...</p>
        </div>
    </div>

    <script>
        // 1. Cargar las tareas desde la API
        fetch('http://127.0.0.1:5000/api/produccion/Estructuras')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('lista-tareas');
                contenedor.innerHTML = '';

                if (data.tareas.length === 0) {
                    contenedor.innerHTML = '<h2 style="text-align:center;">🎉 ¡Todo al día! No hay pendientes.</h2>';
                    return;
                }

                data.tareas.forEach(tarea => {
                    contenedor.innerHTML += `
                        <div class="tarjeta-tarea">
                            <img src="${tarea.foto}" class="foto-mueble" onerror="this.src='https://via.placeholder.com/180?text=SIN+FOTO'">
                            <div class="info-tarea">
                                <div>
                                    <h2>${tarea.producto}</h2>
                                    <div class="fecha-entrega">📅 Entrega: ${tarea.fecha_entrega}</div>
                                    <div class="detalle">
                                        <strong>OT:</strong> ${tarea.codigo_venta} <br>
                                        <strong>Color/Tela:</strong> ${tarea.color}
                                    </div>
                                </div>
                                <button class="btn-terminar" onclick="terminarTarea(${tarea.ticket_id})">
                                    MARCAR COMO COMPLETADO ✔️
                                </button>
                            </div>
                        </div>
                    `;
                });
            })
            .catch(err => {
                console.error(err);
                document.getElementById('lista-tareas').innerHTML = '<p style="color:red;">Error de conexión con el servidor.</p>';
            });

        // 2. Función para terminar la tarea
        function terminarTarea(id) {
            if(confirm("¿Confirmas que terminaste este mueble?")) {
                fetch(`http://127.0.0.1:5000/api/produccion/terminar/${id}`, { method: 'POST' })
                .then(() => {
                    alert("¡Buen trabajo!");
                    location.reload();
                });
            }
        }
    </script>
</body>
</html>
